name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with test extras
        run: pip install -e ".[test]"
      - name: Run pytest
        run: |
          set +e
          python -m pytest
          code=$?
          # Exit code 5 = "no tests collected"; fine until the first tests land (T1.1).
          if [ "$code" -eq 5 ]; then echo "No tests collected yet — treating as success"; exit 0; fi
          exit "$code"
